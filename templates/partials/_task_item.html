<div class="card mb-3 task-card shadow-sm {% if task.completed %}border-success bg-white{% else %}border-secondary{% endif %}" data-sequential="{{ task.is_sequential|yesno:'true,false' }}">
    <div class="card-body p-3">
        <div class="form-check mb-2">
            <input class="form-check-input main-task-check" type="checkbox"
                   name="items" value="{{ task.id }}"
                   id="task_{{ task.id }}"
                   style="transform: scale(1.3); margin-top: 0.3rem;"
                   {% if task.completed %}checked disabled{% endif %}>
            <label class="form-check-label font-weight-bold ml-2 {% if task.completed %}text-success text-decoration-line-through{% endif %}" for="task_{{ task.id }}" style="font-size: 1.1rem;">
                {{ task.description }}
            </label>
        </div>

        <div class="pl-4">
            <input type="text" class="form-control form-control-sm mb-2"
                   name="observacion_{{ task.id }}"
                   placeholder="Añadir observaciones (opcional)..."
                   value="{{ task.observation }}"
                   {% if task.completed %}readonly{% endif %}>

            {% if task.requires_legal_check %}
            <div class="border border-secondary rounded p-2 mt-2 legal-box transition-all">
                <div class="form-check text-danger">
                    <input class="form-check-input legal-checkbox" type="checkbox"
                           name="legal_{{ task.id }}" value="true"
                           id="legal_{{ task.id }}"
                           {% if task.completed %}checked disabled{% endif %}>
                    <label class="form-check-label small font-weight-bold" for="legal_{{ task.id }}">
                        ⚠️ DECLARACIÓN JURADA:
                        <span class="text-dark font-weight-normal">Declaro bajo mi responsabilidad legal que he verificado este ítem según los protocolos exigidos por la instalación.</span>
                    </label>
                </div>
            </div>
            {% endif %}
        </div>
    </div>
</div>
